{% extends 'base.html' %}

{% block content %}
<style>
.on{
  background-color: rgb(124, 211, 124);
  width: 150px;
  padding: auto;
  font-size: 12px;
}
.off{
  background-color: rgb(194, 110, 110);
  width: 150px;
  font-size: 12px;
}
.number{
  background-color: cornflowerblue;
  width: 140px;
  font-size: 12px;
}
.title{
  text-align: center;
}
.harmonogramTable{
  text-align: center;
  position: absolute;
}

</style>

<body>
    <form class = "grid" action = "/harmonogram" method = "POST">


<h1 class="title">{{lang['Schedule'][pickedLang]}}</h1>
<table clas="harmonogramTable">
  <tr>
    {%for day in dni%}
    <th>{{dni[day][pickedLang]}}</th>
    {% endfor %}
  </tr>
    {% for row in godzina %}
    <tr>
      {% for cell in row %}
      <td><input type="Submit" onclick="getValue(this)" 
        class="{%if cell == 'ON' %}on{%elif cell == 'OFF' %}off{% else %}number{%endif%}"  
        value="{{cell}}" 
        name="{{row[0]}}-{{loop.index0}}"/>
        <!-- {{row[0]}}-{{loop.index0}} -->
      </td>
      {% endfor %}
    </tr> 
    {% endfor %}
</table>
<br>

      alert(value);
  }
</script> -->
 </form>

</body>



{% endblock %}
