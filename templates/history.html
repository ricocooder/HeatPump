{% extends 'base.html' %}

{% block content %}
<style>
  .container{
    display: flex;
    flex-wrap: wrap;
    /* width: 1000px; */
  }
  .column{
    height: 30%;
    /* width: fit-content; */
    padding: 10px;
    box-sizing: border-box;
  }
  .rounded-button {
    border: none;
    border-radius: 20px;
    padding: 5px 10px;   
    text-align: center;
    text-decoration: none;
    display: inline-block; 
    cursor: pointer;
    color: #FFF;
    background-color: #33C3F0;
    border-color: #33C3F0; }
</style>
<form id="datetime_range" action="/history" method="GET"> 
<div class="container">
      <div class="column">
        <label for="from">From date</label>
        <input class="text" id="datetimepicker1" type="text" value="{{from_date}}" name="from">
      </div>        
      <div class="column">
        <label for="to">To date</label>           
        <input class="text" id="datetimepicker2" type="text" value="{{to_date}}" name="to">
      </div>           
      <div class="column">           
        <input class="rounded-button" type="submit" value="Submit" style="position:relative" id="submit_button" />
      </div>  

      
      <!-- <label>from_date: {{from_date}}</label>
      <label> to_date: {{to_date}}</label> -->
     
</div>      
</form>
