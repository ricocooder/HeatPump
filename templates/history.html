<form id="datetime_range" action="/history" method="GET"> 
<div class="container">
      <div class="column">
        <label for="from">From date</label>
        <input class="text" id="datetimepicker1" type="text" value="{{from_date}}" name="from">
      </div>        
      <div class="column">
        <label for="to">To date</label>           
        <input class="text" id="datetimepicker2" type="text" value="{{to_date}}" name="to">
      </div>           
      <div class="column">           
        <input class="button-primary" type="submit" value="Submit" style="position:relative" id="submit_button" />
      </div>  
</div>      
</form>
