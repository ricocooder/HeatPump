<html>
<meta http-equiv="refresh" content="5">
<head>
    <style>
        body {
            background-repeat:no-repeat; # wylaczenia powtarzanie tzn jak zdjecie bedzie zamale to nie bedzie ustawiana kolo siebie
            background-attached:fixed;
            background-size:cover;
            background-image: url({{image1}});
             }
    </style>
</head>

<style>
.switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: #2196F3;
}

input:focus + .slider {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .slider:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}
</style>
<body>
    <form class = "grid" action = "/result" method = "POST">
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

        <label >Tamperatura czujnika {{to2}} : {{t2}} <span>&#8451;</span> </label><br><br>
        <label >Tamperatura czujnika {{to3}} : {{t3}} <span>&#8451;</span> </label><br><br>
        <label >Tamperatura czujnika {{to4}} : {{t4}} <span>&#8451;</span> </label><br><br>
        <label >Tamperatura czujnika {{to5}} : {{t5}} <span>&#8451;</span> </label><br><br>
        <label >Tamperatura czujnika {{to6}} : {{t6}} <span>&#8451;</span> </label><br><br><br><br><br><br>
        <label >Tamperatura zadana boiler : {{tz1}}</label><span>&#8451;</span> </label><input type="Submit" value="Przycisk_1" name='Przycisk_1'/><br><br>
